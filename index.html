<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Educativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="vista-inicio" class="pantalla">
        <header>
            <h1>Explorador de Ciencias</h1>
            <p>Selecciona un tema para aprender o ponte a prueba</p>
        </header>
        
        <div class="contenedor-temas">
            <div class="card-tema" onclick="mostrarInfo('quimica')">
                <div class="icono">🧪</div>
                <h2>Química Avanzada</h2>
                <p>Valencias y estados de oxidación</p>
            </div>
            <div class="card-tema" onclick="mostrarInfo('fisica')">
                <div class="icono">⚡</div>
                <h2>Física Atómica</h2>
                <p>Estructura del átomo y energía</p>
            </div>
        </div>

        <button class="btn-principal" onclick="irAlQuiz()">🚀 Ir al Quiz Profesional</button>
    </section>

    <section id="vista-info" class="pantalla oculto">
        <button class="btn-volver" onclick="irAInicio()">⬅ Volver</button>
        <article id="contenido-detalle">
            </article>
    </section>

    <section id="vista-quiz" class="pantalla oculto">
        <div class="quiz-card">
            <div class="progreso-bar"><div id="barra"></div></div>
            <h2 id="quiz-titulo">Desafío de 10 Preguntas</h2>
            <div id="pregunta-texto" class="pregunta"></div>
            <div id="opciones-lista"></div>
            <div id="feedback"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
